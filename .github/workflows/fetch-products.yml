name: Fetch Products

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Fetch from Product Hunt
        env:
          PH_TOKEN: ${{ secrets.PH_TOKEN }}
        run: node scripts/fetch-products.js
        continue-on-error: true

      - name: Fetch from TrustMRR
        env:
          TRUSTMRR_TOKEN: ${{ secrets.TRUSTMRR_TOKEN }}
        run: node scripts/fetch-trustmrr.js
        continue-on-error: true

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
        continue-on-error: true

      - name: Fetch screenshots for new products
        run: node scripts/fetch-screenshots.js
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        continue-on-error: true

      - name: Commit updated products and screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json screenshots/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: daily product fetch and screenshots"
          # Race-safe push: rebase onto any concurrent change, retry a few times
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push origin main && exit 0
            echo "push attempt $i rejected, retrying..."; sleep 5
          done
          echo "push failed after retries" && exit 1
