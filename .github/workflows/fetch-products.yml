name: Fetch Products

on:
  workflow_dispatch: # Manual trigger only (daily schedule intentionally disabled)

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Fetch from Product Hunt
        env:
          PH_TOKEN: ${{ secrets.PH_TOKEN }}
        run: node scripts/fetch-products.js
        continue-on-error: true

      # Persist PH data immediately so a later step's failure can't discard it.
      - name: Commit Product Hunt results
        if: always()
        run: |
          bash scripts/commit.sh "chore: fetch Product Hunt products"

      - name: Fetch from TrustMRR
        env:
          TRUSTMRR_TOKEN: ${{ secrets.TRUSTMRR_TOKEN }}
        run: node scripts/fetch-trustmrr.js
        continue-on-error: true

      - name: Commit TrustMRR results
        if: always()
        run: |
          bash scripts/commit.sh "chore: fetch TrustMRR products"

      # Enrich only newly-added products with their og:image URL (fast; existing kept).
      - name: Fetch og:images
        run: node scripts/fetch-og.js
        continue-on-error: true

      - name: Commit og:images
        if: always()
        run: |
          bash scripts/commit.sh "chore: og:image previews"

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
        continue-on-error: true

      - name: Fetch screenshots for new products
        run: node scripts/fetch-screenshots.js
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        continue-on-error: true

      - name: Commit screenshots
        if: always()
        run: |
          bash scripts/commit.sh "chore: product screenshots"
