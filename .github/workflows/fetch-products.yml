name: Fetch Product Hunt Products

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch products from Product Hunt
        env:
          PH_TOKEN: ${{ secrets.PH_TOKEN }}
        run: node scripts/fetch-products.js

      - name: Fetch screenshots
        run: node scripts/fetch-screenshots.js

      - name: Commit updated products and screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json screenshots/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update products and screenshots"
          git push
