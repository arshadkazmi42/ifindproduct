name: Fetch Product Hunt Products

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch products from Product Hunt
        env:
          PH_TOKEN: ${{ secrets.PH_TOKEN }}
        run: node scripts/fetch-products.js

      - name: Commit updated products
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/products.json && echo "No changes" && exit 0
          git add data/products.json
          git commit -m "chore: update products from Product Hunt"
          git push
